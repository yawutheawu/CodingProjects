<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Polls</title>
    {% load static %}

    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
  </head>
  <body>
    {% if latest_question_list %}
        <ul>
        {% for question in latest_question_list %}
            <a href="{% url 'polls:detail' question.id %}"><li>{{ question.question_text }}</li></a>
        {% endfor %}
        </ul>
    {% else %}
        <p>No polls are available.</p>
    {% endif %}
  </body>
</html>
