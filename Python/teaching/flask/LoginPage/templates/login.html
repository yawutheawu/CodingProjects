<!doctype html>
<html lang="en">
<head>  
    <meta charset="utf-8">
    <title>Login</title>
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <h2 class="inputInstruction">Login</h2>
        <form method="POST" action="/login">
            <div class="input">
                {% if success %}
                    <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                {% else %}
                    <input type="text" class="form-control" id="username" name="username" placeholder="Username" value = {{username}} required>
                {% endif %}
            </div>
            <div class="input">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="fullWidthSubmission">Login</button>
        </form>
        {% if error %}
            <div class="error" role="alert">
                {{ error }}
            </div>
        {% endif %}
        <div class="AlternateActions">
            <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
            <a href="{{ url_for('register') }}">Don't have an account? Register</a>
        </div>
    </div>
</body>
